      <div class="post-abstract">
        <p>九月初有两件关于安全的事件引起了网友们的讨论：一件是 Dropbox 密码外泄事件，暴露了大量用户密码；一件是知乎平台串号现象，用户登录后发现进入了其他人的账号了。我在微博发表了我担忧。</p>
<p>然而就在我发完微博的当晚，我的微博账号就出现了一次异地异常登录。第二天醒来通过私信提醒收到了警告，当天我就更改了密码。微博账号是我常用的第三方登录账号，他的暴露代表我大量的账号已经掌握在其他人手中。</p>

      </di>
